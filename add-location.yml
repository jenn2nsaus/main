name: Add Trick-or-Treat Location

# Triggered by Stepper sending a POST to:
#   https://api.github.com/repos/<owner>/<repo>/dispatches
#   { "event_type": "new-location", "client_payload": { "name": ..., "address": ..., "notes": ... } }
on:
  repository_dispatch:
    types: [new-location]

permissions:
  contents: write

jobs:
  add-location:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Geocode address and update locations.json
        env:
          LOCATION_NAME: ${{ github.event.client_payload.name }}
          LOCATION_ADDRESS: ${{ github.event.client_payload.address }}
          LOCATION_HOURS: ${{ github.event.client_payload.hours }}
          LOCATION_TREATS: ${{ github.event.client_payload.treats }}
          LOCATION_ALLERGENS: ${{ github.event.client_payload.allergens }}
          LOCATION_DESCRIPTION: ${{ github.event.client_payload.description }}
          LOCATION_PHOTO: ${{ github.event.client_payload.photo }}
        run: node scripts/add-location.js

      - name: Commit and push
        run: |
          git config user.name "trick-or-treat-bot"
          git config user.email "actions@github.com"
          git add data/locations.json
          git commit -m "Add location: ${{ github.event.client_payload.name }}" || echo "Nothing to commit"
          for i in 1 2 3; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 3
          done
