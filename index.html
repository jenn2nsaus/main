<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trick-or-Treat Map — Central Coast, NSW</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="title-block">
      <h1>🎃 Trick-or-Treat Map</h1>
      <p class="subtitle">Central Coast, NSW</p>
    </div>
    <div class="header-actions">
      <span id="house-count" class="house-count">Loading houses…</span>
      <a class="register-link" href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">
        Register your house
      </a>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <div id="empty-state" class="empty-state hidden">
      <p><strong>No houses registered yet.</strong></p>
      <p>Be the first on the map — <a href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">register your house</a>.</p>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
