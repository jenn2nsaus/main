<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trick-or-Treat Map — Central Coast, NSW</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mystery+Quest&family=Baloo+2:wght@600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="title-block">
      <h1>
        <svg class="pumpkin-icon pumpkin-icon-header" viewBox="0 0 100 100" aria-hidden="true">
          <path d="M46,12 Q44,4 50,3 Q56,4 54,12 L53,20 L47,20 Z" />
          <ellipse cx="50" cy="58" rx="40" ry="32" />
          <path d="M22,32 Q17,58 24,84" />
          <path d="M36,28 Q32,58 37,88" />
          <path d="M64,28 Q68,58 63,88" />
          <path d="M78,32 Q83,58 76,84" />
          <path d="M28,48 L40,48 L32,60 Z" />
          <path d="M72,48 L60,48 L68,60 Z" />
          <path d="M26,70 L34,78 L42,70 L50,78 L58,70 L66,78 L74,70" />
        </svg>
        <span class="title-text">Trick-or-Treat Map</span>
      </h1>
      <p class="subtitle">Central Coast, NSW</p>
    </div>
    <div id="allergen-legend" class="allergen-legend" aria-label="Allergen badge legend"></div>
    <div class="header-actions">
      <span id="house-count" class="house-count">Loading houses…</span>
      <a class="register-link" href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">
        Register your house
      </a>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <div class="purple-tint" aria-hidden="true"></div>
    <div id="empty-state" class="empty-state hidden">
      <p><strong>No houses registered yet.</strong></p>
      <p>Be the first on the map — <a href="https://rcdnplx5.paperform.co/" target="_blank" rel="noopener">register your house</a>.</p>
    </div>
  </main>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
